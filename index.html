<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>导航站点</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="实用导航站点，包含工具、学习、娱乐等多个分类">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="Content-Encoding" content="gzip">
  <meta http-equiv="Cache-Control" content="max-age=31536000, public">
  <link rel="stylesheet" href="//cdn.staticfile.org/docsify/4.12.2/themes/vue.css">

  <style>
    /* 卡片样式 */
    .card-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin: 20px 0;
    }
    
    .card {
      border: 1px solid #eaecef;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
      cursor: pointer;
    }
    
    .card:hover {
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
      transform: translateY(-2px);
    }
    
    .card a {
      display: block;
      text-decoration: none;
      color: inherit;
    }
    
    .card-head {
      background-color: #f8f9fa;
      padding: 12px 16px;
      border-bottom: 1px solid #eaecef;
    }
    
    .card-head h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      color: #3F51B5;
    }
    
    .card-body {
      padding: 12px 16px;
      font-size: 14px;
      color: #666;
      line-height: 1.5;
    }
    
    /* 分割线样式 */
    hr {
      border: 1px solid #2e67bc;
      height: 5px;
      background: linear-gradient(to right, transparent, #2e67bc, transparent);
      margin: 32px 0;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '导航',                           //侧边栏名称
      nameLink: true,                     // 开启侧边栏标题链接
      homepage: 'index.md',           // 设置默认首页为index页面
      themeColor: '#3F51B5',
      
      // 插件配置
      auto2top: true,                     // 自动返回顶部

      loadSidebar: true,                  // 加载侧边栏（需要准备对应md文件）
      
      autoHeader: true,                   // 自动添加标题
      
      PluginError: true,                  // 插件错误提示

      loadNavbar: false,                     // 关闭加载导航栏
      mergeNavbar: false,                     // 关闭移动端合并导航栏


      // logo: '/icon.svg',             // 移除导航栏logo

      logoLink: false,                     // 关闭logo链接

      nativeEmoji: false,                     // 开启原生emoji

      notFoundPage: true,                     // 开启404页面（需要准备对应md文件）

      relativePath: true,                     // 开启相对路径

      topMargin: 90, // default: 0             // 顶部间距（单位：像素）  
      


      ga: 'UA-XXXXX-Y',                     // 开启谷歌分析
      
      pagination: {
        previousText: '上一章',
        nextText: '下一章',
        crossChapter: true,
        crossChapterText: true,
      },

      footer: {
        copy: '<span>&copy; 2026 </span>',
        auth: 'Cnkrru power by docsify',
        pre: '<hr/>',
        style: 'text-align: center;',
        class: 'className'
      },





    }
  </script>

  <!-- Docsify v4 -->
  <script src="//cdn.staticfile.org/docsify/4.12.2/docsify.min.js"></script>

  <!-- 谷歌分析 -->
  <script src="//cdn.staticfile.org/docsify/4.12.2/lib/plugins/ga.min.js"></script>
  <!-- 分页插件 -->
  <script src="//cdn.staticfile.org/docsify-pagination/2.5.0/docsify-pagination.min.js"></script>
  <!-- 页脚插件 -->
  <script src="//cdn.staticfile.org/docsify-footer-enh/1.0.1/docsify-footer-enh.min.js"></script>
  <!-- 侧边栏折叠插件 -->
  <script src="//cdn.staticfile.org/docsify-sidebar-collapse/1.3.2/docsify-sidebar-collapse.min.js"></script>
</body>
</html>
